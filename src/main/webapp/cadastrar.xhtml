<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Cadastro de Livro</title>
</h:head>
<h:body>
    <h2>Cadastro de Livro</h2>
    <h:messages globalOnly="true" style="color:red;"/>
    
    <h:form>
        <h:panelGrid columns="2">
            <h:outputText value="Título:" />
            <h:inputText value="#{livroBean.livro.titulo}" />
            
            <h:outputText value="Autor:" />
            <h:inputText value="#{livroBean.livro.autor}" />
            
            <h:outputText value="Ano:" />
            <h:inputText value="#{livroBean.livro.ano}" />
            
            <h:outputText value="ISBN (13 dígitos):" />
            <h:inputText value="#{livroBean.livro.isbn}" />
        </h:panelGrid>
        <br/>
        <h:commandButton value="Cadastrar" action="#{livroBean.cadastrar}" />
        <br/><br/>
        <a href="index.jsp">Voltar ao Menu</a>
    </h:form>
</h:body>
</html>
